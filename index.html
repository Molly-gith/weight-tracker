<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>晨昏 · 体重日历 · 产品原型</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,ital,wght@9..144,0,400;9..144,0,500;9..144,0,600;9..144,1,400&family=Newsreader:opsz@6..72&display=swap');
:root{
  --paper:#F7F3EC; --paper-deep:#EFE8DC; --card:#FFFDF9;
  --ink:#2B2620; --ink-soft:#6B6357; --ink-faint:#A9A091;
  --line:rgba(43,38,32,.12); --dawn:#E8A15C; --dusk:#7C6BA8; --sage:#8B9D77;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--paper);color:var(--ink);font-family:'Newsreader',Georgia,serif;-webkit-font-smoothing:antialiased;line-height:1.6;background-image:radial-gradient(rgba(43,38,32,.022) 1px, transparent 1px);background-size:15px 15px;}

/* hero */
.hero{max-width:1180px;margin:0 auto;padding:60px 40px 30px;}
.hero .eyebrow{font-family:'Fraunces',serif;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--dawn);margin-bottom:18px;}
.hero h1{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(34px,5.5vw,58px);line-height:1.08;letter-spacing:-.02em;margin-bottom:18px;}
.hero h1 em{font-style:italic;color:var(--dusk);}
.hero .lede{font-size:clamp(16px,1.9vw,19px);color:var(--ink-soft);max-width:600px;line-height:1.55;}

/* 版本切换器 */
.switcher{max-width:1180px;margin:0 auto;padding:14px 40px 0;display:flex;gap:10px;align-items:center;}
.switcher .sw-label{font-family:'Fraunces',serif;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-right:6px;}
.sw-btn{font-family:'Fraunces',serif;font-size:15px;font-weight:500;padding:9px 20px;border-radius:2px;border:1px solid var(--line);background:transparent;color:var(--ink-soft);cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:flex-start;gap:2px;min-width:150px;}
.sw-btn .sw-tag{font-size:11px;letter-spacing:.08em;color:var(--ink-faint);}
.sw-btn .sw-name{font-size:15px;}
.sw-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.sw-btn.active .sw-tag{color:var(--dawn);}

/* 主体 */
.body{max-width:1180px;margin:0 auto;padding:26px 40px 70px;display:grid;grid-template-columns:1fr 400px;gap:56px;align-items:start;}
.narr{padding-top:8px;}
.narr .n-tag{display:inline-block;font-family:'Fraunces',serif;font-size:12px;letter-spacing:.08em;color:var(--dawn);background:rgba(232,161,92,.12);padding:4px 12px;border-radius:20px;margin-bottom:16px;}
.narr h2{font-family:'Fraunces',serif;font-weight:500;font-size:30px;line-height:1.2;letter-spacing:-.01em;margin-bottom:8px;}
.narr .n-sub{font-style:italic;font-size:16px;color:var(--ink-faint);margin-bottom:22px;}
.narr .n-story{font-size:16.5px;color:var(--ink-soft);line-height:1.72;max-width:540px;margin-bottom:28px;}

/* 助手能力卡（仅V2） */
.caps{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:520px;margin-top:6px;}
.cap{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;}
.cap .c-icon{font-size:20px;color:var(--dusk);margin-bottom:8px;}
.cap h4{font-family:'Fraunces',serif;font-weight:500;font-size:16px;margin-bottom:4px;}
.cap p{font-size:13.5px;color:var(--ink-soft);line-height:1.5;}
.caps-label{font-family:'Fraunces',serif;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin:6px 0 12px;}

/* 手机 */
.viewer{position:sticky;top:30px;}
.phone{width:400px;background:#1a1613;border-radius:44px;padding:12px;box-shadow:0 0 0 1.5px #3a332c, 0 34px 80px -24px rgba(43,38,32,.55);position:relative;margin:0 auto;}
.phone .notch{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#1a1613;border-radius:0 0 15px 15px;z-index:20;}
.phone iframe{width:100%;height:760px;border:none;border-radius:33px;display:block;background:var(--paper);}
.hotspot{position:absolute;z-index:15;width:16px;height:16px;border-radius:50%;background:var(--ink);border:1.5px solid rgba(247,243,236,.95);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:10px;font-weight:600;color:var(--paper);transform:translate(-50%,-50%);box-shadow:0 2px 6px rgba(43,38,32,.3);transition:transform .22s cubic-bezier(.3,1.3,.5,1), background .22s, opacity .2s;}
.hotspot::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(43,38,32,.22);animation:hp 3s ease-in-out infinite;}
.hotspot:hover{background:var(--dusk);transform:translate(-50%,-50%) scale(1.3);}
.hotspot:hover::after{opacity:0;}
.hotspot.active{opacity:0;pointer-events:none;}
.hotspot.active::after{animation:none;opacity:0;}
@keyframes hp{0%,100%{opacity:0;transform:scale(.85);}50%{opacity:1;transform:scale(1.15);}}
.viewer-cap{text-align:center;margin-top:20px;}
.viewer-cap .vc-hint{font-size:13px;color:var(--ink-faint);font-style:italic;line-height:1.6;}
.viewer-cap .vc-toggle{margin-top:12px;display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);cursor:pointer;user-select:none;font-family:'Fraunces',serif;}
.vc-toggle input{display:none;}
.vc-sw{width:36px;height:21px;background:var(--paper-deep);border:1px solid var(--line);border-radius:20px;position:relative;transition:.2s;}
.vc-sw::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:var(--ink-faint);transition:.2s;}
.vc-toggle input:checked + .vc-sw{background:rgba(124,107,168,.25);border-color:var(--dusk);}
.vc-toggle input:checked + .vc-sw::after{left:17px;background:var(--dusk);}

.anno-pop{position:fixed;z-index:200;background:var(--ink);color:var(--paper);padding:12px 15px;border-radius:9px;max-width:230px;font-size:13.5px;line-height:1.55;box-shadow:0 10px 30px rgba(43,38,32,.32);opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;transform:translateY(4px);}
.anno-pop.show{opacity:1;transform:translateY(0);}
.anno-pop h4{font-family:'Fraunces',serif;font-size:14px;font-weight:600;margin-bottom:4px;color:var(--dawn);}

@media(max-width:960px){
  .body{grid-template-columns:1fr;gap:36px;}
  .viewer{position:static;order:-1;}
  .phone{width:340px;}.phone iframe{height:700px;}
  .hero{padding:44px 24px 24px;}.switcher{padding:12px 24px 0;flex-wrap:wrap;}
  .body{padding:22px 24px 50px;}
  .caps{grid-template-columns:1fr 1fr;}
}
@media(max-width:400px){ .phone{width:300px;}.phone iframe{height:630px;} .sw-btn{min-width:130px;} }
</style>
</head>

const VERSIONS = [{"id": "v1", "tag": "V1", "name": "晨昏 · 体重日历", "sub": "极简的日历式早晚记录", "story": "第一版只做一件事:把记录的门槛降到最低。一个日历,点任意一天就地填早晚体重,颜色显影趋势。没有多余功能——因为记录能否坚持,比功能多少更重要。", "annotations": [{"x": 50, "y": 20, "title": "目标进度", "desc": "最新体重 + 距目标还有多远,进度条从起点色渐变到达标绿"}, {"x": 50, "y": 45, "title": "点格即录", "desc": "点日历任意一天,格子就地展开成输入卡填早晚。底部两点:橙=早晨已记,紫=睡前已记,灰=还没记"}]}, {"id": "v2", "tag": "V2", "name": "晨昏 · 体重日历 + 助手", "sub": "日历为主,新增 AI 晨昏助手", "story": "记录之后呢?数据不该只是躺着。第二版在日历下方加了一个低调的助手入口——它先看懂你的趋势,记住你随口提的习惯,在你想放弃时给一句暖话,只给方向性建议而非精确指标。它的角色是一面镜子,不是发号施令的教练。", "annotations": [{"x": 50, "y": 78, "title": "助手入口", "desc": "日历仍是主角,助手是低调的第二入口。点开进入对话,它基于你的真实记录说话"}, {"x": 50, "y": 45, "title": "日历不变", "desc": "核心记录体验和 V1 完全一致,点格即录、晨昏色阶都保留"}]}, {"id": "v3", "tag": "V3", "name": "晨昏 · 今日 + 日历", "sub": "竞品洞察后的克制吸收", "story": "做了竞品分析后,我从一款多维度记录 App 里选择性吸收了四点——但坚决没引入喝水/饮食/运动那一排标签,守住极简。新增「今天」聚合页(晨重/晚重双卡),日历格子现在显示每日变化值,顶部升级为「减重第 N 天」的旅程叙事,日历下方加了月度小结。底部两个 Tab:今天 / 日历。加的每一项,都只和体重本身相关。", "hasTabs": true, "annotationsByTab": {"today": [{"x": 50, "y": 28, "title": "晨重/晚重双卡", "desc": "借鉴竞品:今日聚合页,早晚双卡各显数值与较昨日变化(↓绿=降 ↑紫=升)"}, {"x": 50, "y": 52, "title": "减重旅程", "desc": "借鉴竞品:把目标进度升级为「减重第 N 天 + 已完成百分比」,漫长目标变成有进度的旅程"}, {"x": 50, "y": 92, "title": "底部双 Tab", "desc": "今天 / 日历两个视图。点「日历」查看每日变化值和本月小结——守住极简,没有多维度标签"}], "cal": [{"x": 50, "y": 45, "title": "每日变化值", "desc": "借鉴竞品:格子显示当日均值 + 较前一天变化。↓绿=降,↑紫=升。底部两点:橙=早晨已记,紫=睡前已记,灰=还没记"}, {"x": 50, "y": 88, "title": "本月小结", "desc": "借鉴竞品:打卡天数、最轻体重、区间变化——给一个月度的回顾与成就感"}]}}];
const CAPS = [{"icon": "◷", "title": "看懂趋势", "desc": "基于真实体重曲线,而非套话"}, {"icon": "❋", "title": "记住习惯", "desc": "你随口提的,它记下来,反哺建议"}, {"icon": "♡", "title": "温柔陪伴", "desc": "想放弃时给暖话,鼓励你放下执念"}, {"icon": "→", "title": "方向建议", "desc": "只给方向,不给卡路里/精确指标"}];
const $=id=>document.getElementById(id);
let curV=0, showAnno=true, activeAnno=null, curTab='today';

// 返回当前应显示的标注集：有 Tab 的版本按当前 Tab 取，否则用固定 annotations
function getAnnos(){
  const v=VERSIONS[curV];
  if(v.hasTabs && v.annotationsByTab) return v.annotationsByTab[curTab]||[];
  return v.annotations||[];
}

function b64ToHtml(b64){
  const bin=atob(b64); const bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}

function renderSwitcher(){
  const sw=$('switcher');
  // 保留 label，追加按钮
  sw.querySelectorAll('.sw-btn').forEach(b=>b.remove());
  VERSIONS.forEach((v,i)=>{
    const b=document.createElement('button');
    b.className='sw-btn'+(i===curV?' active':'');
    b.innerHTML=`<span class="sw-tag">${v.tag}</span><span class="sw-name">${v.name}</span>`;
    b.onclick=()=>switchVersion(i);
    sw.appendChild(b);
  });
}

function switchVersion(i){
  curV=i; activeAnno=null; curTab='today'; $('annoPop').classList.remove('show');
  renderSwitcher();
  loadProto();
  renderNarr();
}

function loadProto(){
  const v=VERSIONS[curV], frame=$('frame');
  frame.setAttribute('sandbox','allow-scripts allow-forms allow-modals allow-popups');
  frame.srcdoc=b64ToHtml(PROTOS[v.id]);
  // 重置标注层显隐
  $('hsLayer').style.opacity='1'; $('hsLayer').style.pointerEvents='';
  renderHotspots();
}

function renderNarr(){
  const v=VERSIONS[curV];
  let capsHtml='';
  if(v.id==='v2'){
    capsHtml=`<div class="caps-label">助手的四种能力（按重要性）</div><div class="caps">`+
      CAPS.map(c=>`<div class="cap"><div class="c-icon">${c.icon}</div><h4>${c.title}</h4><p>${c.desc}</p></div>`).join('')+`</div>`;
  }
  $('narr').innerHTML=`
    <span class="n-tag">${v.tag} · ${v.sub}</span>
    <h2>${v.name}</h2>
    <div class="n-story">${v.story}</div>
    ${capsHtml}`;
}

function renderHotspots(){
  const annos=getAnnos(), layer=$('hsLayer');
  if(!showAnno){ layer.innerHTML=''; return; }
  layer.innerHTML=annos.map((a,i)=>`<div class="hotspot ${activeAnno===i?'active':''}" style="left:${a.x}%;top:${a.y}%" data-ai="${i}">${i+1}</div>`).join('');
  const pop=$('annoPop');
  function showPop(i,el){
    const a=annos[i], r=el.getBoundingClientRect();
    $('apTitle').textContent=a.title; $('apDesc').textContent=a.desc;
    const w=240; let left=r.right+12;
    if(left+w>window.innerWidth-12) left=r.left-w-12;
    pop.style.left=Math.max(12,left)+'px'; pop.style.top=Math.max(12,r.top-4)+'px';
    pop.classList.add('show');
  }
  [...layer.querySelectorAll('.hotspot')].forEach(h=>{
    const i=+h.dataset.ai;
    h.addEventListener('mouseenter',()=>{ if(activeAnno==null) showPop(i,h); });
    h.addEventListener('mouseleave',()=>{ if(activeAnno==null) pop.classList.remove('show'); });
    h.addEventListener('click',e=>{ e.stopPropagation(); activeAnno=(activeAnno===i)?null:i; renderHotspots(); if(activeAnno!=null){ const el=[...$('hsLayer').querySelectorAll('.hotspot')][i]; showPop(i,el); } else pop.classList.remove('show'); });
  });
}
$('annoTog').onchange=e=>{ showAnno=e.target.checked; activeAnno=null; $('annoPop').classList.remove('show'); renderHotspots(); };
document.addEventListener('click',e=>{ if(!e.target.closest('.hotspot')&&!e.target.closest('.anno-pop')){ $('annoPop').classList.remove('show'); activeAnno=null; renderHotspots(); }});

// 原型内弹出遮罩层（编辑卡/助手面板）时，淡出标注；切 Tab 时更新标注
window.addEventListener('message',e=>{
  if(!e.data||!e.data.type) return;
  const layer=$('hsLayer');
  if(e.data.type==='overlayOpen'){
    layer.style.transition='opacity .25s'; layer.style.opacity='0'; layer.style.pointerEvents='none';
    $('annoPop').classList.remove('show'); activeAnno=null;
  } else if(e.data.type==='overlayClose'){
    layer.style.opacity='1'; layer.style.pointerEvents=''; renderHotspots();
  } else if(e.data.type==='tabChange'){
    curTab=e.data.tab; activeAnno=null; $('annoPop').classList.remove('show');
    renderHotspots();
  }
});

// init
renderSwitcher();
loadProto();
renderNarr();
</script>
